<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - EcoFuture</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="navbar">
    <div class="logo">EcoFuture</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="products.html">Products</a>
      <a href="impact.html">Impact</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="full-screen contact-section">
    <h1 class="fade-in-up">Contact Us</h1>
    <p class="fade-in">We’d love to hear from you. Please fill out the form below.</p>
    <form class="contact-form fade-in-up" novalidate>
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" name="firstName" required>
      </div>

      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="lastName" required>
      </div>

      <div class="form-group">
        <label for="Mobile">Username</label>
        <div class="input-group">
          <span>@</span>
          <input type="text" id="username" name="username" required>
        </div>
      </div>

      <div class="form-group">
        <label for="city">City</label>
        <input type="text" id="city" name="city" required>
      </div>

      <div class="form-group">
        <label for="state">State</label>
        <select id="state" name="state" required>
          <option disabled selected value="">Choose...</option>
          <option>Delhi</option>
          <option>Maharashtra</option>
          <option>UP</option>
          <option>Others</option>
        </select>
      </div>

      <div class="form-group">
        <label for="zip">Zip</label>
        <input type="text" id="zip" name="zip" required>
      </div>

      <div class="form-check">
        <input type="checkbox" id="terms" required>
        <label for="terms">I agree to terms and conditions</label>
      </div>

      <div class="form-submit">
        <button type="submit" class="btn">Submit</button>
      </div>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 EcoFuture. All rights reserved.</p>
  </footer>

  <script src="scripts.js" defer></script>
</body>
</html>
