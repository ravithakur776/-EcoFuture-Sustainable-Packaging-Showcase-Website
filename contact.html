<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - EcoFuture</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="enhancements.css">
</head>
<body>
  <header class="navbar">
    <div class="logo">EcoFuture</div>
    <nav aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="products.html">Products</a>
      <a href="impact.html">Impact</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="full-screen contact-section">
    <h1 class="fade-in-up">Contact Us</h1>
    <p class="fade-in">We would love to hear from you. Please fill out the form below.</p>

    <form class="contact-form fade-in-up" id="contact-form" novalidate>
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" name="firstName" required>
        <p class="form-error" aria-live="polite"></p>
      </div>

      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="lastName" required>
        <p class="form-error" aria-live="polite"></p>
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-group">
          <span>@</span>
          <input type="text" id="username" name="username" required>
        </div>
        <p class="form-error" aria-live="polite"></p>
      </div>

      <div class="form-group">
        <label for="city">City</label>
        <input type="text" id="city" name="city" required>
        <p class="form-error" aria-live="polite"></p>
      </div>

      <div class="form-group">
        <label for="state">State</label>
        <select id="state" name="state" required>
          <option disabled selected value="">Choose...</option>
          <option>Delhi</option>
          <option>Maharashtra</option>
          <option>Uttar Pradesh</option>
          <option>Others</option>
        </select>
        <p class="form-error" aria-live="polite"></p>
      </div>

      <div class="form-group">
        <label for="zip">Zip</label>
        <input type="text" id="zip" name="zip" required>
        <p class="form-error" aria-live="polite"></p>
      </div>

      <div class="form-check">
        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">I agree to terms and conditions</label>
      </div>
      <p class="form-error" data-error-for="terms" aria-live="polite"></p>

      <div class="form-submit">
        <button type="submit" class="btn">Submit</button>
      </div>

      <div id="form-success" class="form-success" role="status" aria-live="polite">
        <span class="success-check">&#10003;</span>
        <span>Message sent successfully. Our team will reach out soon.</span>
      </div>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 EcoFuture. All rights reserved.</p>
  </footer>

  <script src="enhancements.js" defer></script>
  <script src="scripts.js" defer></script>
</body>
</html>
